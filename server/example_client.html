<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Three.js WebSocket Example</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #status {
      position: fixed; top: 10px; left: 10px; color: #fff;
      font-family: monospace; font-size: 14px; z-index: 10;
      background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 4px;
    }
    #log {
      position: fixed; bottom: 10px; left: 10px; color: #0f0;
      font-family: monospace; font-size: 12px; z-index: 10;
      background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 4px;
      max-height: 200px; overflow-y: auto; width: 400px;
    }
  </style>
</head>
<body>
  <div id="status">Connecting...</div>
  <div id="log"></div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');

    function log(msg) {
      const line = document.createElement('div');
      line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }

    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(3, 3, 3);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);

    // Grid and axes
    scene.add(new THREE.GridHelper(10, 10, 0x444444, 0x222222));
    scene.add(new THREE.AxesHelper(3));

    // Lighting
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(5, 10, 7);
    scene.add(dirLight);

    // Object to move
    const geometry = new THREE.BoxGeometry(1, 1, 1);
    const material = new THREE.MeshStandardMaterial({ color: 0x4488ff });
    const cube = new THREE.Mesh(geometry, material);
    scene.add(cube);

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Take a screenshot and return base64
    function screenshot() {
      renderer.render(scene, camera);
      return renderer.domElement.toDataURL('image/png');
    }

    // WebSocket connection
    function connect() {
      const ws = new WebSocket('ws://localhost:8000/ws');

      ws.onopen = () => {
        statusEl.textContent = 'Connected to server';
        statusEl.style.color = '#0f0';
        log('WebSocket connected');
      };

      ws.onmessage = (event) => {
        const cmd = JSON.parse(event.data);
        log(`Received: ${JSON.stringify(cmd)}`);

        switch (cmd.action) {
          case 'updatePosition':
            cube.position.set(cmd.x, cmd.y, cmd.z);
            log(`Moved cube to (${cmd.x}, ${cmd.y}, ${cmd.z})`);
            break;

          case 'updateRotation':
            cube.quaternion.set(cmd.x, cmd.y, cmd.z, cmd.w);
            log(`Rotated cube to (${cmd.x}, ${cmd.y}, ${cmd.z}, ${cmd.w})`);
            break;

          case 'cameraUpdate':
            const zoom = cmd.zoomPercentage / 100;
            const distance = 3 + (1 - zoom) * 10;
            camera.position.normalize().multiplyScalar(distance);
            camera.lookAt(0, 0, 0);
            log(`Camera zoom: ${cmd.zoomPercentage}%`);
            break;

          default:
            log(`Unknown action: ${cmd.action}`);
        }

        // Render one frame then send screenshot back
        renderer.render(scene, camera);
        requestAnimationFrame(() => {
          const image = screenshot();
          ws.send(JSON.stringify({ image }));
          log('Sent screenshot back');
        });
      };

      ws.onclose = () => {
        statusEl.textContent = 'Disconnected — reconnecting...';
        statusEl.style.color = '#f00';
        log('WebSocket disconnected, retrying in 2s...');
        setTimeout(connect, 2000);
      };

      ws.onerror = () => {
        ws.close();
      };
    }

    connect();
  </script>
</body>
</html>
