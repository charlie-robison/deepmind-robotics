<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Three.js WebSocket Example</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #status {
      position: fixed; top: 10px; left: 10px; color: #fff;
      font-family: monospace; font-size: 14px; z-index: 10;
      background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 4px;
    }
    #log {
      position: fixed; bottom: 10px; left: 10px; color: #0f0;
      font-family: monospace; font-size: 12px; z-index: 10;
      background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 4px;
      max-height: 200px; overflow-y: auto; width: 400px;
    }
    #topdown {
      position: fixed; top: 10px; right: 10px; z-index: 10;
      border: 2px solid rgba(255,255,255,0.3); border-radius: 6px;
      overflow: hidden;
    }
    #topdown-label {
      position: fixed; top: 14px; right: 60px; z-index: 11;
      color: #fff; font-family: monospace; font-size: 11px;
      background: rgba(0,0,0,0.5); padding: 2px 6px; border-radius: 3px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="status">Connecting...</div>
  <div id="log"></div>
  <div id="topdown"></div>
  <div id="topdown-label">Top Down</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');

    function log(msg) {
      const line = document.createElement('div');
      line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }

    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(3, 3, 3);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);

    // Lighting
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(5, 10, 7);
    scene.add(dirLight);

    // Load cozy living room GLB as environment
    const gltfLoader = new GLTFLoader();
    gltfLoader.load('/static/cozy_living_room_baked.glb', (gltf) => {
      scene.add(gltf.scene);
      log('Loaded cozy living room environment');
    }, undefined, (err) => {
      log(`Error loading GLB: ${err.message}`);
    });

    // Object to move
    const geometry = new THREE.BoxGeometry(0.2, 0.8, 0.2);
    const material = new THREE.MeshStandardMaterial({ color: 0x4488ff });
    const cube = new THREE.Mesh(geometry, material);
    cube.position.set(-3, 0.4, 4); // left side, further back
    scene.add(cube);

    // First-person camera attached to the cube
    const fpCamera = new THREE.PerspectiveCamera(90, window.innerWidth / window.innerHeight, 0.01, 1000);
    cube.add(fpCamera);
    fpCamera.position.set(0, 0.4, 0); // on top of the cube's head
    fpCamera.lookAt(new THREE.Vector3(0, 0.4, -1)); // look forward (-Z)
    // Store the local forward direction
    const fpForward = new THREE.Vector3(0, 0, -1);

    let useFirstPerson = true; // default to first-person view

    // Top-down mini-map
    const topdownSize = 500;
    const topdownRenderer = new THREE.WebGLRenderer({ antialias: true });
    topdownRenderer.setSize(topdownSize, topdownSize);
    document.getElementById('topdown').appendChild(topdownRenderer.domElement);

    const topdownCamera = new THREE.OrthographicCamera(-4, 4, 4, -4, 0.1, 100);
    topdownCamera.position.set(0, 20, 0);
    topdownCamera.lookAt(0, 0, 0);

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      const activeCamera = useFirstPerson ? fpCamera : camera;
      renderer.render(scene, activeCamera);

      // Render top-down view of entire scene
      topdownRenderer.render(scene, topdownCamera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      fpCamera.aspect = window.innerWidth / window.innerHeight;
      fpCamera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Toggle between first-person and orbit camera with 'V' key
    window.addEventListener('keydown', (e) => {
      if (e.key === 'v' || e.key === 'V') {
        useFirstPerson = !useFirstPerson;
        controls.enabled = !useFirstPerson;
        log(`Camera: ${useFirstPerson ? 'First Person' : 'Orbit'}`);
      }
    });

    // Take a screenshot from the first-person camera
    function screenshot() {
      renderer.render(scene, fpCamera);
      return renderer.domElement.toDataURL('image/png');
    }

    // WebSocket connection
    function connect() {
      const ws = new WebSocket('ws://localhost:8000/ws');

      ws.onopen = () => {
        statusEl.textContent = 'Connected to server';
        statusEl.style.color = '#0f0';
        log('WebSocket connected');
      };

      ws.onmessage = (event) => {
        const cmd = JSON.parse(event.data);
        log(`Received: ${JSON.stringify(cmd)}`);

        switch (cmd.action) {
          case 'updatePosition':
            cube.position.x += cmd.dx;
            cube.position.y += cmd.dy;
            cube.position.z += cmd.dz;
            log(`Moved cube by (${cmd.dx}, ${cmd.dy}, ${cmd.dz}) → (${cube.position.x.toFixed(2)}, ${cube.position.y.toFixed(2)}, ${cube.position.z.toFixed(2)})`);
            break;

          case 'updateRotation':
            cube.quaternion.set(cmd.x, cmd.y, cmd.z, cmd.w);
            log(`Rotated cube to (${cmd.x}, ${cmd.y}, ${cmd.z}, ${cmd.w})`);
            break;

          case 'cameraUpdate':
            if (cmd.view === 'firstperson') {
              useFirstPerson = true;
              controls.enabled = false;
            } else if (cmd.view === 'orbit') {
              useFirstPerson = false;
              controls.enabled = true;
            }
            if (cmd.zoomPercentage !== undefined) {
              const zoom = cmd.zoomPercentage / 100;
              const distance = 3 + (1 - zoom) * 10;
              camera.position.normalize().multiplyScalar(distance);
              camera.lookAt(0, 0, 0);
            }
            log(`Camera update — view: ${useFirstPerson ? 'FP' : 'orbit'}`);
            break;

          default:
            log(`Unknown action: ${cmd.action}`);
        }

        // Render one frame then send screenshot back
        renderer.render(scene, fpCamera);
        requestAnimationFrame(() => {
          const image = screenshot();
          ws.send(JSON.stringify({ image }));
          log('Sent screenshot back');
        });
      };

      ws.onclose = () => {
        statusEl.textContent = 'Disconnected — reconnecting...';
        statusEl.style.color = '#f00';
        log('WebSocket disconnected, retrying in 2s...');
        setTimeout(connect, 2000);
      };

      ws.onerror = () => {
        ws.close();
      };
    }

    connect();
  </script>
</body>
</html>
