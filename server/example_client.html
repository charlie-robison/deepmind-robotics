<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Agent vs Agent Training</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #split-container {
      display: flex; width: 100vw; height: 100vh;
    }
    #left-view, #right-view {
      flex: 1; position: relative; border-right: 2px solid #333;
    }
    #right-view { border-right: none; }
    .view-label {
      position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
      color: #fff; font-family: monospace; font-size: 14px; z-index: 10;
      background: rgba(0,0,0,0.7); padding: 4px 12px; border-radius: 4px;
    }
    #left-view .view-label { color: #4488ff; }
    #right-view .view-label { color: #ff4444; }
    #scoreboard {
      position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
      z-index: 20; background: rgba(0,0,0,0.85); color: #fff;
      font-family: monospace; font-size: 14px; padding: 10px 20px;
      border-radius: 6px; border: 1px solid rgba(255,255,255,0.2);
      display: flex; gap: 24px; align-items: center;
    }
    #scoreboard .agent-score { text-align: center; }
    #scoreboard .agent-score.object { color: #4488ff; }
    #scoreboard .agent-score.enemy { color: #ff4444; }
    #scoreboard .moves { color: #aaa; }
    #scoreboard .turn-indicator { color: #0f0; font-size: 12px; }
    #topdown {
      position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
      z-index: 10; border: 2px solid rgba(255,255,255,0.3); border-radius: 6px;
      overflow: hidden;
    }
    #topdown-label {
      position: fixed; bottom: 215px; left: 50%; transform: translateX(-50%);
      z-index: 11; color: #fff; font-family: monospace; font-size: 11px;
      background: rgba(0,0,0,0.5); padding: 2px 6px; border-radius: 3px;
    }
    #log {
      position: fixed; bottom: 10px; left: 10px; color: #0f0;
      font-family: monospace; font-size: 11px; z-index: 10;
      background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 4px;
      max-height: 180px; overflow-y: auto; width: 320px;
    }
    #overshoot-panel {
      position: fixed; bottom: 10px; right: 10px; z-index: 10;
      background: rgba(0,0,0,0.8); color: #0ff; padding: 10px 14px;
      font-family: monospace; font-size: 11px; border-radius: 6px;
      max-width: 320px; max-height: 180px; overflow-y: auto;
      border: 1px solid rgba(0,255,255,0.3);
    }
    #overshoot-panel .label { color: #fff; font-size: 11px; margin-bottom: 4px; opacity: 0.7; }
    #collide-flash {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      z-index: 100; font-family: monospace; font-size: 80px; font-weight: bold;
      color: #ff00ff; text-shadow: 0 0 40px #ff00ff, 0 0 80px #9900ff;
      pointer-events: none; opacity: 0; transition: opacity 0.1s;
    }
    #collide-flash.visible {
      opacity: 1; animation: collide-pulse 0.8s ease-out;
    }
    #win-banner {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      z-index: 200; font-family: monospace; font-size: 48px; font-weight: bold;
      pointer-events: none; opacity: 0; transition: opacity 0.3s;
      text-shadow: 0 0 30px currentColor;
    }
    #win-banner.visible { opacity: 1; }
    @keyframes collide-pulse {
      0% { opacity: 1; transform: translate(-50%, -50%) scale(1.5); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
    }
  </style>
</head>
<body>
  <div id="collide-flash">CAUGHT!</div>
  <div id="win-banner"></div>

  <div id="scoreboard">
    <div class="agent-score object">
      <div>OBJECT</div>
      <div id="object-wins">Wins: 0</div>
    </div>
    <div>
      <div class="moves" id="move-count">Moves: 0</div>
      <div class="turn-indicator" id="turn-indicator">--</div>
    </div>
    <div class="agent-score enemy">
      <div>ENEMY</div>
      <div id="enemy-wins">Wins: 0</div>
    </div>
  </div>

  <div id="split-container">
    <div id="left-view">
      <div class="view-label">Object (Blue)</div>
    </div>
    <div id="right-view">
      <div class="view-label">Enemy (Red)</div>
    </div>
  </div>

  <div id="topdown"></div>
  <div id="topdown-label">Top Down</div>
  <div id="log"></div>
  <div id="overshoot-panel">
    <div class="label">Agent Vision</div>
    <div id="overshoot-result">Initializing...</div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/",
        "overshoot": "https://esm.sh/overshoot@2.0.0-alpha.7",
        "livekit-client": "https://esm.sh/livekit-client",
        "hls.js": "https://esm.sh/hls.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { RealtimeVision } from 'overshoot';

    const logEl = document.getElementById('log');
    const overshootResultEl = document.getElementById('overshoot-result');
    const turnIndicatorEl = document.getElementById('turn-indicator');
    const moveCountEl = document.getElementById('move-count');
    const objectWinsEl = document.getElementById('object-wins');
    const enemyWinsEl = document.getElementById('enemy-wins');

    function log(msg) {
      const line = document.createElement('div');
      line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }

    // =========================================================================
    // SCENE
    // =========================================================================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(5, 10, 7);
    scene.add(dirLight);

    const gltfLoader = new GLTFLoader();
    gltfLoader.load('/static/cozy_living_room_baked.glb', (gltf) => {
      scene.add(gltf.scene);
      log('Loaded environment');
    }, undefined, (err) => log(`GLB error: ${err.message}`));

    // =========================================================================
    // OBJECT (blue cube agent)
    // =========================================================================
    const objectGeo = new THREE.BoxGeometry(0.2, 0.8, 0.2);
    const objectMat = new THREE.MeshStandardMaterial({ color: 0x4488ff });
    const objectMesh = new THREE.Mesh(objectGeo, objectMat);
    objectMesh.position.set(-3, 0.4, 4);
    scene.add(objectMesh);

    // First-person camera for object
    const objectCam = new THREE.PerspectiveCamera(90, 1, 0.01, 1000);
    objectMesh.add(objectCam);
    objectCam.position.set(0, 0.4, 0);

    // =========================================================================
    // ENEMY (red cube agent)
    // =========================================================================
    const enemyGeo = new THREE.BoxGeometry(0.4, 0.4, 0.4);
    const enemyMat = new THREE.MeshStandardMaterial({ color: 0xff4444, emissive: 0x881111, emissiveIntensity: 0.5 });
    const enemyMesh = new THREE.Mesh(enemyGeo, enemyMat);
    enemyMesh.position.set(0, 0.6, 0);
    scene.add(enemyMesh);

    const enemyLight = new THREE.PointLight(0xff4444, 1.5, 3);
    enemyMesh.add(enemyLight);

    // First-person camera for enemy
    const enemyCam = new THREE.PerspectiveCamera(90, 1, 0.01, 1000);
    enemyMesh.add(enemyCam);
    enemyCam.position.set(0, 0.2, 0);

    // =========================================================================
    // RENDERERS: left (object), right (enemy), top-down
    // =========================================================================
    const leftView = document.getElementById('left-view');
    const rightView = document.getElementById('right-view');

    const objectRenderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    leftView.appendChild(objectRenderer.domElement);

    const enemyRenderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    rightView.appendChild(enemyRenderer.domElement);

    const topdownSize = 200;
    const topdownRenderer = new THREE.WebGLRenderer({ antialias: true });
    topdownRenderer.setSize(topdownSize, topdownSize);
    document.getElementById('topdown').appendChild(topdownRenderer.domElement);

    const topdownCamera = new THREE.OrthographicCamera(-5, 5, 5, -5, 0.1, 100);
    topdownCamera.position.set(0, 20, 0);
    topdownCamera.lookAt(0, 0, 0);

    function resizeRenderers() {
      const w = Math.floor(window.innerWidth / 2);
      const h = window.innerHeight;
      objectRenderer.setSize(w, h);
      objectCam.aspect = w / h;
      objectCam.updateProjectionMatrix();
      enemyRenderer.setSize(w, h);
      enemyCam.aspect = w / h;
      enemyCam.updateProjectionMatrix();
    }
    resizeRenderers();
    window.addEventListener('resize', resizeRenderers);

    // =========================================================================
    // HELPERS
    // =========================================================================
    function faceToward(mesh, targetX, targetZ) {
      const dx = targetX - mesh.position.x;
      const dz = targetZ - mesh.position.z;
      mesh.rotation.y = Math.atan2(dx, dz) + Math.PI;
    }

    // =========================================================================
    // ANIMATION
    // =========================================================================
    function animate() {
      requestAnimationFrame(animate);
      // Enemy hover bob + always face the object
      enemyMesh.position.y = 0.6 + Math.sin(Date.now() * 0.003) * 0.15;
      faceToward(enemyMesh, objectMesh.position.x, objectMesh.position.z);

      // Object always faces the enemy
      faceToward(objectMesh, enemyMesh.position.x, enemyMesh.position.z);

      objectRenderer.render(scene, objectCam);
      enemyRenderer.render(scene, enemyCam);
      topdownRenderer.render(scene, topdownCamera);
    }
    animate();

    // =========================================================================
    // PATH
    // =========================================================================
    let PATH_WAYPOINTS = [
      { x: -3, z: 4 },
      { x: 3, z: 4 },
      { x: 3, z: -1 },
      { x: 0.5, z: -1 },
      { x: 0.5, z: -3 },
      { x: -2, z: -3 },
    ];
    let currentWaypointIdx = 1;
    const WAYPOINT_THRESHOLD = 0.3;
    const STEP_SIZE = 0.25;
    const ENEMY_STEP_SIZE = 0.3;
    const pathY = 0.05;
    const COLLISION_RADIUS = 0.5;

    let pathLine = null;
    let waypointDots = [];

    function drawPath() {
      if (pathLine) scene.remove(pathLine);
      waypointDots.forEach(d => scene.remove(d));
      waypointDots = [];

      const pathPoints = PATH_WAYPOINTS.map(wp => new THREE.Vector3(wp.x, pathY, wp.z));
      const pathGeom = new THREE.BufferGeometry().setFromPoints(pathPoints);
      pathLine = new THREE.Line(pathGeom, new THREE.LineBasicMaterial({ color: 0x00ff00, linewidth: 2 }));
      scene.add(pathLine);

      PATH_WAYPOINTS.forEach((wp, i) => {
        const dotGeo = new THREE.SphereGeometry(0.08, 8, 8);
        const dotMat = new THREE.MeshBasicMaterial({ color: i === 0 ? 0x0088ff : 0x00ff00 });
        const dot = new THREE.Mesh(dotGeo, dotMat);
        dot.position.set(wp.x, pathY + 0.05, wp.z);
        scene.add(dot);
        waypointDots.push(dot);
      });
    }
    drawPath();

    // Trail
    const trailPoints = [objectMesh.position.clone()];
    const trailGeom = new THREE.BufferGeometry().setFromPoints(trailPoints);
    const trailLine = new THREE.Line(trailGeom, new THREE.LineBasicMaterial({ color: 0x4488ff, transparent: true, opacity: 0.5 }));
    scene.add(trailLine);

    const enemyTrailPoints = [enemyMesh.position.clone()];
    const enemyTrailGeom = new THREE.BufferGeometry().setFromPoints(enemyTrailPoints);
    const enemyTrailLine = new THREE.Line(enemyTrailGeom, new THREE.LineBasicMaterial({ color: 0xff4444, transparent: true, opacity: 0.5 }));
    scene.add(enemyTrailLine);

    // =========================================================================
    // GAME STATE
    // =========================================================================
    let totalMoves = 0;
    let objectWins = 0;
    let enemyWins = 0;
    let roundOver = false;

    function updateScoreboard() {
      moveCountEl.textContent = `Moves: ${totalMoves}`;
      objectWinsEl.textContent = `Wins: ${objectWins}`;
      enemyWinsEl.textContent = `Wins: ${enemyWins}`;
    }

    function showWin(winner) {
      roundOver = true;
      const banner = document.getElementById('win-banner');
      if (winner === 'object') {
        objectWins++;
        banner.style.color = '#4488ff';
        banner.textContent = 'OBJECT WINS!';
        log('Object reached the goal!');
      } else {
        enemyWins++;
        banner.style.color = '#ff4444';
        banner.textContent = 'ENEMY WINS!';
        log('Enemy caught the object!');

        const flashEl = document.getElementById('collide-flash');
        flashEl.classList.remove('visible');
        void flashEl.offsetWidth;
        flashEl.classList.add('visible');
        setTimeout(() => flashEl.classList.remove('visible'), 800);
      }
      banner.classList.add('visible');
      updateScoreboard();

      // Auto-reset after 3s
      setTimeout(() => {
        banner.classList.remove('visible');
        resetRound();
      }, 3000);
    }

    function resetRound() {
      objectMesh.position.set(-3, 0.4, 4);
      enemyMesh.position.set(0, 0.6, 0);
      currentWaypointIdx = 1;
      totalMoves = 0;
      roundOver = false;
      trailPoints.length = 0;
      trailPoints.push(objectMesh.position.clone());
      trailGeom.setFromPoints(trailPoints);
      enemyTrailPoints.length = 0;
      enemyTrailPoints.push(enemyMesh.position.clone());
      enemyTrailGeom.setFromPoints(enemyTrailPoints);
      updateScoreboard();
      log('--- New round ---');
    }

    // =========================================================================
    // MOVEMENT HELPERS
    // =========================================================================

    // Object: step toward current waypoint, optionally dodging left/right
    function objectStep(dodgeDir) {
      const wp = PATH_WAYPOINTS[currentWaypointIdx];
      const dx = wp.x - objectMesh.position.x;
      const dz = wp.z - objectMesh.position.z;
      const dist = Math.hypot(dx, dz);

      if (dist < WAYPOINT_THRESHOLD) {
        if (currentWaypointIdx < PATH_WAYPOINTS.length - 1) {
          currentWaypointIdx++;
          log(`Reached WP ${currentWaypointIdx}/${PATH_WAYPOINTS.length - 1}`);
        } else {
          return 'goal';
        }
      }

      const wp2 = PATH_WAYPOINTS[currentWaypointIdx];
      const dx2 = wp2.x - objectMesh.position.x;
      const dz2 = wp2.z - objectMesh.position.z;
      const dist2 = Math.hypot(dx2, dz2);
      const step = Math.min(STEP_SIZE, dist2);

      let moveDx = (dx2 / dist2) * step;
      let moveDz = (dz2 / dist2) * step;

      // Lateral dodge
      if (dodgeDir) {
        const len = dist2 || 1;
        const perpX = -dz2 / len;
        const perpZ = dx2 / len;
        const dodgeMag = STEP_SIZE * 0.6;
        if (dodgeDir === 'left') {
          moveDx += perpX * dodgeMag;
          moveDz += perpZ * dodgeMag;
        } else {
          moveDx -= perpX * dodgeMag;
          moveDz -= perpZ * dodgeMag;
        }
      }

      // Clamp
      const mag = Math.hypot(moveDx, moveDz);
      if (mag > STEP_SIZE) {
        moveDx = (moveDx / mag) * STEP_SIZE;
        moveDz = (moveDz / mag) * STEP_SIZE;
      }

      objectMesh.position.x += moveDx;
      objectMesh.position.z += moveDz;

      trailPoints.push(new THREE.Vector3(objectMesh.position.x, pathY, objectMesh.position.z));
      trailGeom.setFromPoints(trailPoints);

      return 'moved';
    }

    // Enemy: step toward a target position
    function enemyStep(moveDir) {
      const tx = objectMesh.position.x;
      const tz = objectMesh.position.z;
      const dx = tx - enemyMesh.position.x;
      const dz = tz - enemyMesh.position.z;
      const dist = Math.hypot(dx, dz);
      if (dist < 0.01) return;

      let moveDx = (dx / dist) * ENEMY_STEP_SIZE;
      let moveDz = (dz / dist) * ENEMY_STEP_SIZE;

      // VLM can suggest flanking direction
      if (moveDir === 'flank-left' || moveDir === 'flank-right') {
        const len = dist || 1;
        const perpX = -dz / len;
        const perpZ = dx / len;
        const flankMag = ENEMY_STEP_SIZE * 0.5;
        if (moveDir === 'flank-left') {
          moveDx += perpX * flankMag;
          moveDz += perpZ * flankMag;
        } else {
          moveDx -= perpX * flankMag;
          moveDz -= perpZ * flankMag;
        }
        const mag = Math.hypot(moveDx, moveDz);
        if (mag > ENEMY_STEP_SIZE) {
          moveDx = (moveDx / mag) * ENEMY_STEP_SIZE;
          moveDz = (moveDz / mag) * ENEMY_STEP_SIZE;
        }
      }

      enemyMesh.position.x += moveDx;
      enemyMesh.position.z += moveDz;

      enemyTrailPoints.push(new THREE.Vector3(enemyMesh.position.x, pathY, enemyMesh.position.z));
      enemyTrailGeom.setFromPoints(enemyTrailPoints);
    }

    function checkCollision() {
      const d = Math.hypot(
        objectMesh.position.x - enemyMesh.position.x,
        objectMesh.position.z - enemyMesh.position.z
      );
      return d < COLLISION_RADIUS;
    }

    // =========================================================================
    // SCREENSHOTS for VLM
    // =========================================================================
    function objectScreenshot() {
      objectRenderer.render(scene, objectCam);
      return objectRenderer.domElement.toDataURL('image/png');
    }

    function enemyScreenshot() {
      enemyRenderer.render(scene, enemyCam);
      return enemyRenderer.domElement.toDataURL('image/png');
    }

    // =========================================================================
    // VLM PROMPTS
    // =========================================================================
    function objectPrompt() {
      const pos = objectMesh.position;
      const wp = PATH_WAYPOINTS[currentWaypointIdx];
      const ex = enemyMesh.position;
      const enemyDist = Math.hypot(pos.x - ex.x, pos.z - ex.z).toFixed(1);
      return `You control a BLUE robot navigating a path. Current position: (${pos.x.toFixed(1)}, ${pos.z.toFixed(1)}). Next waypoint: (${wp.x.toFixed(1)}, ${wp.z.toFixed(1)}). A RED enemy cube is ${enemyDist} units away trying to catch you. Look at the image. Should you go "straight" toward the waypoint, dodge "left", or dodge "right" to avoid the enemy? Answer with just one word: straight, left, or right.`;
    }

    function enemyPrompt() {
      const pos = enemyMesh.position;
      const target = objectMesh.position;
      const dist = Math.hypot(pos.x - target.x, pos.z - target.z).toFixed(1);
      const wp = PATH_WAYPOINTS[Math.min(currentWaypointIdx + 1, PATH_WAYPOINTS.length - 1)];
      return `You control a RED enemy trying to catch a BLUE robot. You are at (${pos.x.toFixed(1)}, ${pos.z.toFixed(1)}). The blue robot is ${dist} units away at (${target.x.toFixed(1)}, ${target.z.toFixed(1)}). It is heading toward (${wp.x.toFixed(1)}, ${wp.z.toFixed(1)}). Look at the image. Should you go "direct" straight at it, "flank-left" to cut it off, or "flank-right"? Answer with one: direct, flank-left, or flank-right.`;
    }

    // =========================================================================
    // PHASE 1: DETECT PATH (Gemini)
    // =========================================================================
    async function detectWaypoints() {
      log('Phase 1: Detecting waypoints...');
      overshootResultEl.textContent = 'Detecting waypoints...';

      const imgResp = await fetch('/topdown-image');
      if (!imgResp.ok) throw new Error(`Failed to fetch top-down image (${imgResp.status})`);
      const imgData = await imgResp.json();

      const resp = await fetch('/detect-waypoints', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: imgData.image }),
      });

      if (!resp.ok) throw new Error(`Detection failed (${resp.status})`);
      const data = await resp.json();
      log(`Detected ${data.waypoints?.length || 0} waypoints`);
      return data;
    }

    // =========================================================================
    // MAIN: PHASE 1 -> PHASE 2 (turn-based VLM agent loop)
    // =========================================================================
    async function init() {
      try {
        const keyResp = await fetch('/overshoot-key');
        const { key } = await keyResp.json();
        if (!key) {
          overshootResultEl.textContent = 'No API key configured';
          return;
        }

        // Phase 1: Detect waypoints
        try {
          const detection = await detectWaypoints();
          if (detection?.waypoints?.length >= 2) {
            PATH_WAYPOINTS = detection.waypoints.map(wp => ({ x: wp.x, z: wp.z }));
            currentWaypointIdx = 1;
            drawPath();
            log(`Loaded ${PATH_WAYPOINTS.length} waypoints from VLM`);
          }
        } catch (err) {
          log(`Waypoint detection failed, using defaults: ${err.message}`);
        }

        await new Promise(r => setTimeout(r, 1000));

        // Phase 2: Turn-based agent loop
        log('Phase 2: Starting turn-based agent battle');

        // Intercept getUserMedia to provide canvas streams
        const objectStream = objectRenderer.domElement.captureStream(10);
        const enemyStream = enemyRenderer.domElement.captureStream(10);
        let activeStream = objectStream;

        const origGUM = navigator.mediaDevices.getUserMedia.bind(navigator.mediaDevices);
        navigator.mediaDevices.getUserMedia = async (constraints) => {
          if (constraints?.video) return activeStream;
          return origGUM(constraints);
        };

        // Object's VLM
        let objectVlmResult = null;
        let objectWaiting = false;

        const objectVision = new RealtimeVision({
          apiKey: key,
          model: 'Qwen/Qwen3.5-9B',
          prompt: objectPrompt(),
          source: { type: 'camera', cameraFacing: 'environment' },
          outputSchema: {
            type: 'object',
            properties: {
              move: { type: 'string', description: '"straight", "left", or "right"' },
            },
            required: ['move'],
          },
          onResult: (result) => {
            if (!objectWaiting) return;
            let move = 'straight';
            if (result.ok) {
              const raw = (result.result || '').toLowerCase();
              if (raw.includes('left')) move = 'left';
              else if (raw.includes('right')) move = 'right';
            }
            objectVlmResult = move;
            objectWaiting = false;
          },
          onError: () => { objectVlmResult = 'straight'; objectWaiting = false; },
        });

        // Enemy's VLM
        let enemyVlmResult = null;
        let enemyWaiting = false;

        // We need a second stream for enemy - switch active stream before starting
        const enemyVision = new RealtimeVision({
          apiKey: key,
          model: 'Qwen/Qwen3.5-9B',
          prompt: enemyPrompt(),
          source: { type: 'camera', cameraFacing: 'environment' },
          outputSchema: {
            type: 'object',
            properties: {
              move: { type: 'string', description: '"direct", "flank-left", or "flank-right"' },
            },
            required: ['move'],
          },
          onResult: (result) => {
            if (!enemyWaiting) return;
            let move = 'direct';
            if (result.ok) {
              const raw = (result.result || '').toLowerCase();
              if (raw.includes('flank-left') || raw.includes('flank left')) move = 'flank-left';
              else if (raw.includes('flank-right') || raw.includes('flank right')) move = 'flank-right';
            }
            enemyVlmResult = move;
            enemyWaiting = false;
          },
          onError: () => { enemyVlmResult = 'direct'; enemyWaiting = false; },
        });

        // Start object VLM first
        activeStream = objectStream;
        await objectVision.start();
        log('Object VLM started');

        // Start enemy VLM
        activeStream = enemyStream;
        await enemyVision.start();
        log('Enemy VLM started');

        // Turn-based loop
        let turn = 'object'; // 'object' or 'enemy'

        const TURN_INTERVAL = 400;

        const gameLoop = setInterval(() => {
          if (roundOver) return;

          if (turn === 'object') {
            // Object's turn
            if (!objectWaiting && objectVlmResult === null) {
              // Request VLM decision
              objectWaiting = true;
              turnIndicatorEl.textContent = "Object's turn (thinking...)";
              objectVision.updatePrompt(objectPrompt());
              overshootResultEl.textContent = `Object thinking...`;
              return;
            }

            if (objectWaiting) return; // still waiting

            // Apply object's move
            const move = objectVlmResult || 'straight';
            objectVlmResult = null;
            const dodgeDir = move === 'straight' ? null : move;
            const result = objectStep(dodgeDir);
            totalMoves++;
            updateScoreboard();
            log(`Object: ${move} (WP ${currentWaypointIdx})`);
            overshootResultEl.textContent = `Object moved: ${move}`;
            turnIndicatorEl.textContent = "Object moved";

            if (result === 'goal') {
              showWin('object');
              return;
            }

            if (checkCollision()) {
              showWin('enemy');
              return;
            }

            turn = 'enemy';

          } else {
            // Enemy's turn
            if (!enemyWaiting && enemyVlmResult === null) {
              enemyWaiting = true;
              turnIndicatorEl.textContent = "Enemy's turn (thinking...)";
              enemyVision.updatePrompt(enemyPrompt());
              overshootResultEl.textContent = `Enemy thinking...`;
              return;
            }

            if (enemyWaiting) return;

            // Apply enemy's move
            const move = enemyVlmResult || 'direct';
            enemyVlmResult = null;
            enemyStep(move);
            totalMoves++;
            updateScoreboard();
            log(`Enemy: ${move}`);
            overshootResultEl.textContent = `Enemy moved: ${move}`;
            turnIndicatorEl.textContent = "Enemy moved";

            if (checkCollision()) {
              showWin('enemy');
              return;
            }

            turn = 'object';
          }
        }, TURN_INTERVAL);

      } catch (err) {
        overshootResultEl.textContent = `Failed: ${err.message}`;
        log(`Init failed: ${err.message}`);
      }
    }

    init();

    // WebSocket connection (for external control / screenshots)
    function connect() {
      const ws = new WebSocket('ws://localhost:8000/ws');

      ws.onopen = () => log('WebSocket connected');

      ws.onmessage = (event) => {
        const cmd = JSON.parse(event.data);
        if (cmd.action === 'updatePosition') {
          objectMesh.position.x += cmd.dx;
          objectMesh.position.y += cmd.dy;
          objectMesh.position.z += cmd.dz;
        } else if (cmd.action === 'updateRotation') {
          objectMesh.rotation.x += cmd.dx;
          objectMesh.rotation.y += cmd.dy;
          objectMesh.rotation.z += cmd.dz;
        }

        requestAnimationFrame(() => {
          const image = objectScreenshot();
          ws.send(JSON.stringify({ image }));
        });
      };

      ws.onclose = () => setTimeout(connect, 2000);
      ws.onerror = () => ws.close();
    }
    connect();
  </script>
</body>
