<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Three.js WebSocket Example</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #status {
      position: fixed; top: 10px; left: 10px; color: #fff;
      font-family: monospace; font-size: 14px; z-index: 10;
      background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 4px;
    }
    #log {
      position: fixed; bottom: 10px; left: 10px; color: #0f0;
      font-family: monospace; font-size: 12px; z-index: 10;
      background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 4px;
      max-height: 200px; overflow-y: auto; width: 400px;
    }
    #topdown {
      position: fixed; top: 10px; right: 10px; z-index: 10;
      border: 2px solid rgba(255,255,255,0.3); border-radius: 6px;
      overflow: hidden;
    }
    #topdown-label {
      position: fixed; top: 14px; right: 60px; z-index: 11;
      color: #fff; font-family: monospace; font-size: 11px;
      background: rgba(0,0,0,0.5); padding: 2px 6px; border-radius: 3px;
      pointer-events: none;
    }
    #overshoot-panel {
      position: fixed; bottom: 10px; right: 10px; z-index: 10;
      background: rgba(0,0,0,0.8); color: #0ff; padding: 12px 16px;
      font-family: monospace; font-size: 12px; border-radius: 6px;
      max-width: 400px; max-height: 200px; overflow-y: auto;
      border: 1px solid rgba(0,255,255,0.3);
    }
    #overshoot-panel .label {
      color: #fff; font-size: 11px; margin-bottom: 6px; opacity: 0.7;
    }
  </style>
</head>
<body>
  <div id="status">Connecting...</div>
  <div id="log"></div>
  <div id="topdown"></div>
  <div id="topdown-label">Top Down</div>
  <div id="overshoot-panel">
    <div class="label">Overshoot Vision</div>
    <div id="overshoot-result">Initializing...</div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/",
        "overshoot": "https://esm.sh/overshoot@2.0.0-alpha.7",
        "livekit-client": "https://esm.sh/livekit-client",
        "hls.js": "https://esm.sh/hls.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { RealtimeVision } from 'overshoot';

    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');

    function log(msg) {
      const line = document.createElement('div');
      line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }

    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(3, 3, 3);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);

    // Lighting
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(5, 10, 7);
    scene.add(dirLight);

    // Load cozy living room GLB as environment
    const gltfLoader = new GLTFLoader();
    gltfLoader.load('/static/cozy_living_room_baked.glb', (gltf) => {
      scene.add(gltf.scene);
      log('Loaded cozy living room environment');
    }, undefined, (err) => {
      log(`Error loading GLB: ${err.message}`);
    });

    // Object to move
    const geometry = new THREE.BoxGeometry(0.2, 0.8, 0.2);
    const material = new THREE.MeshStandardMaterial({ color: 0x4488ff });
    const cube = new THREE.Mesh(geometry, material);
    cube.position.set(-3, 0.4, 4); // left side, further back
    scene.add(cube);

    // First-person camera attached to the cube
    const fpCamera = new THREE.PerspectiveCamera(90, window.innerWidth / window.innerHeight, 0.01, 1000);
    cube.add(fpCamera);
    fpCamera.position.set(0, 0.4, 0); // on top of the cube's head
    fpCamera.rotation.set(0, 0, 0);

    let useFirstPerson = true;

    // Top-down mini-map
    const topdownSize = 500;
    const topdownRenderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    topdownRenderer.setSize(topdownSize, topdownSize);
    document.getElementById('topdown').appendChild(topdownRenderer.domElement);

    const topdownCamera = new THREE.OrthographicCamera(-4, 4, 4, -4, 0.1, 100);
    topdownCamera.position.set(0, 20, 0);
    topdownCamera.lookAt(0, 0, 0);

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      const activeCamera = useFirstPerson ? fpCamera : camera;
      renderer.render(scene, activeCamera);
      topdownRenderer.render(scene, topdownCamera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      fpCamera.aspect = window.innerWidth / window.innerHeight;
      fpCamera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === 'v' || e.key === 'V') {
        useFirstPerson = !useFirstPerson;
        controls.enabled = !useFirstPerson;
        log(`Camera: ${useFirstPerson ? 'First Person' : 'Orbit'}`);
      }
    });

    function screenshot() {
      renderer.render(scene, fpCamera);
      return renderer.domElement.toDataURL('image/png');
    }

    // =========================================================================
    // PATH DEFINITION & VISUALIZATION
    // =========================================================================
    const overshootResultEl = document.getElementById('overshoot-result');

    // Default path waypoints (will be replaced by VLM-planned safe path)
    let PATH_WAYPOINTS = [
      { x: -3,   z:  4   },  // start (cube spawn)
      { x:  3,   z:  4   },  // right along bottom
      { x:  3,   z: -1   },  // up the right side
      { x:  0.5, z: -1   },  // left across middle
      { x:  0.5, z: -3   },  // up to top area
      { x: -2,   z: -3   },  // left to top-left
    ];
    let currentWaypointIdx = 1;
    const WAYPOINT_THRESHOLD = 0.3;
    const STEP_SIZE = 0.25;
    const pathY = 0.05;

    // Path visualization objects (recreated when path changes)
    let pathLine = null;
    let waypointDots = [];

    function drawPath() {
      if (pathLine) scene.remove(pathLine);
      waypointDots.forEach(d => scene.remove(d));
      waypointDots = [];

      const pathPoints = PATH_WAYPOINTS.map(wp => new THREE.Vector3(wp.x, pathY, wp.z));
      const pathGeom = new THREE.BufferGeometry().setFromPoints(pathPoints);
      pathLine = new THREE.Line(pathGeom, new THREE.LineBasicMaterial({ color: 0x00ff00, linewidth: 2 }));
      scene.add(pathLine);

      PATH_WAYPOINTS.forEach((wp, i) => {
        const dotGeo = new THREE.SphereGeometry(0.08, 8, 8);
        const dotMat = new THREE.MeshBasicMaterial({ color: i === 0 ? 0x0088ff : 0x00ff00 });
        const dot = new THREE.Mesh(dotGeo, dotMat);
        dot.position.set(wp.x, pathY + 0.05, wp.z);
        scene.add(dot);
        waypointDots.push(dot);
      });
    }
    drawPath();

    // Trail: track where the cube has actually been
    const trailPoints = [cube.position.clone()];
    const trailGeom = new THREE.BufferGeometry().setFromPoints(trailPoints);
    const trailLine = new THREE.Line(trailGeom, new THREE.LineBasicMaterial({ color: 0xff4444 }));
    scene.add(trailLine);

    function updateTrail() {
      trailPoints.push(new THREE.Vector3(cube.position.x, pathY, cube.position.z));
      trailGeom.setFromPoints(trailPoints);
    }

    // Rotate cube so the FP camera faces the final goal
    function faceGoal() {
      const goal = PATH_WAYPOINTS[PATH_WAYPOINTS.length - 1];
      const dx = goal.x - cube.position.x;
      const dz = goal.z - cube.position.z;
      const targetYaw = Math.atan2(dx, dz) + Math.PI;
      let diff = targetYaw - cube.rotation.y;
      while (diff > Math.PI) diff -= 2 * Math.PI;
      while (diff < -Math.PI) diff += 2 * Math.PI;
      cube.rotation.y += diff;
      return diff;
    }

    // =========================================================================
    // PHASE 1: DETECT WAYPOINTS FROM IMAGE VIA SERVER (Gemini Vision)
    // =========================================================================

    // Pass a base64 image to Gemini for waypoint + obstacle detection.
    // If no image is provided, fetches the default top-down image from the server.
    async function detectWaypoints(base64Image = null) {
      log('Phase 1: Loading top-down image for waypoint detection...');
      overshootResultEl.textContent = 'Detecting waypoints from top-down image...';

      // If no image provided, fetch the default one from the server
      if (!base64Image) {
        log('Fetching top-down path image from server...');
        const imgResp = await fetch('/topdown-image');
        if (!imgResp.ok) throw new Error(`Failed to fetch top-down image (${imgResp.status})`);
        const imgData = await imgResp.json();
        base64Image = imgData.image;
      }

      log('Sending image to Gemini for waypoint detection...');
      const resp = await fetch('/detect-waypoints', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: base64Image }),
      });

      if (!resp.ok) {
        const errText = await resp.text();
        throw new Error(`Detection failed (${resp.status}): ${errText}`);
      }

      const data = await resp.json();
      log(`Detected ${data.waypoints?.length || 0} waypoints, ${data.obstacles?.length || 0} obstacles`);
      if (data.reasoning) log(`Reasoning: ${data.reasoning}`);
      return data;
    }

    // =========================================================================
    // OBSTACLE VISUALIZATION (from VLM detection)
    // =========================================================================
    let obstacleBoxes = [];

    function visualizeObstacles(obstacles) {
      obstacleBoxes.forEach(b => scene.remove(b));
      obstacleBoxes = [];

      obstacles.forEach(obs => {
        const w = obs.width || 1;
        const d = obs.depth || 1;
        // Light transparent fill
        const geo = new THREE.PlaneGeometry(w, d);
        const mat = new THREE.MeshBasicMaterial({
          color: 0xff0000, transparent: true, opacity: 0.15, side: THREE.DoubleSide,
        });
        const plane = new THREE.Mesh(geo, mat);
        plane.rotation.x = -Math.PI / 2;
        plane.position.set(obs.center_x, 0.02, obs.center_z);
        scene.add(plane);
        obstacleBoxes.push(plane);

        // Dashed outline rectangle on the ground
        const halfW = w / 2, halfD = d / 2;
        const pts = [
          new THREE.Vector3(-halfW, 0, -halfD),
          new THREE.Vector3( halfW, 0, -halfD),
          new THREE.Vector3( halfW, 0,  halfD),
          new THREE.Vector3(-halfW, 0,  halfD),
          new THREE.Vector3(-halfW, 0, -halfD),
        ];
        const lineGeo = new THREE.BufferGeometry().setFromPoints(pts);
        lineGeo.computeBoundingSphere();
        const dashMat = new THREE.LineDashedMaterial({
          color: 0xff4444, dashSize: 0.15, gapSize: 0.1, linewidth: 1,
        });
        const dashLine = new THREE.Line(lineGeo, dashMat);
        dashLine.computeLineDistances();
        dashLine.position.set(obs.center_x, 0.03, obs.center_z);
        scene.add(dashLine);
        obstacleBoxes.push(dashLine);
      });
    }

    // =========================================================================
    // NAVIGATION FUNCTIONS
    // =========================================================================

    function buildNavPrompt() {
      const pos = cube.position;
      const wp = PATH_WAYPOINTS[currentWaypointIdx];
      const dx = wp.x - pos.x;
      const dz = wp.z - pos.z;
      const dist = Math.hypot(dx, dz);
      return `You are an obstacle-avoidance system for a robot navigating a 3D room. You see the robot's first-person view.

Current position: x=${pos.x.toFixed(2)}, z=${pos.z.toFixed(2)}
Target waypoint ${currentWaypointIdx}/${PATH_WAYPOINTS.length - 1}: x=${wp.x.toFixed(2)}, z=${wp.z.toFixed(2)} (distance: ${dist.toFixed(2)})
Heading: ${(cube.rotation.y * 180 / Math.PI).toFixed(0)} degrees

The robot is following a deterministic path detected from a top-down view.
Your job is to check for obstacles and TEMPORARILY DEVIATE when needed:
- If the path ahead is CLEAR of obstacles, output adjust_dx=0 and adjust_dz=0 (stay on path).
- If you see furniture, walls, or objects BLOCKING the path ahead, output a lateral adjustment (max 0.15 per axis) to steer AROUND the obstacle temporarily.
- Once the obstacle is passed, return to adjust_dx=0, adjust_dz=0 to rejoin the planned path.
- Prioritize AVOIDING COLLISIONS over staying exactly on the path.
- "reasoning": describe what you see (clear floor, obstacle on left/right, deviating to avoid, etc.)`;
    }

    function stepTowardWaypoint(adjustDx = 0, adjustDz = 0) {
      const wp = PATH_WAYPOINTS[currentWaypointIdx];
      const dx = wp.x - cube.position.x;
      const dz = wp.z - cube.position.z;
      const dist = Math.hypot(dx, dz);

      if (dist < WAYPOINT_THRESHOLD) {
        if (currentWaypointIdx < PATH_WAYPOINTS.length - 1) {
          currentWaypointIdx++;
          log(`Reached waypoint ${currentWaypointIdx}/${PATH_WAYPOINTS.length - 1}`);
          return false;
        }
        return true; // done
      }

      const step = Math.min(STEP_SIZE, dist);
      let moveDx = (dx / dist) * step + adjustDx;
      let moveDz = (dz / dist) * step + adjustDz;

      const mag = Math.hypot(moveDx, moveDz);
      if (mag > STEP_SIZE) {
        moveDx = (moveDx / mag) * STEP_SIZE;
        moveDz = (moveDz / mag) * STEP_SIZE;
      }

      const rotDy = faceGoal();

      cube.position.x += moveDx;
      cube.position.z += moveDz;
      updateTrail();

      fetch('/updatePosition', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ dx: moveDx, dy: 0, dz: moveDz }),
      }).catch(() => {});

      if (Math.abs(rotDy) > 0.01) {
        fetch('/updateRotation', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ dx: 0, dy: rotDy, dz: 0 }),
        }).catch(() => {});
      }

      return false;
    }

    // =========================================================================
    // MAIN INIT: PHASE 1 (ANALYZE) -> PHASE 2 (NAVIGATE)
    // =========================================================================
    async function initOvershoot() {
      try {
        const keyResp = await fetch('/overshoot-key');
        const { key } = await keyResp.json();
        if (!key) {
          overshootResultEl.textContent = 'No API key configured';
          log('Set OVERSHOOT_API env var on the server');
          return;
        }

        // ---- PHASE 1: Detect waypoints from top-down image (Gemini) ----
        overshootResultEl.textContent = 'Detecting waypoints from top-down image...';
        let detectionResult = null;
        try {
          detectionResult = await detectWaypoints();
        } catch (err) {
          overshootResultEl.textContent = `Waypoint detection failed: ${err.message}`;
          log(`Waypoint detection failed: ${err.message}`);
          return;
        }

        if (!detectionResult || !detectionResult.waypoints || detectionResult.waypoints.length < 2) {
          overshootResultEl.textContent = 'Error: VLM returned insufficient waypoints';
          log('VLM detection returned insufficient waypoints');
          return;
        }

        // Use the VLM-detected waypoints as the deterministic path
        PATH_WAYPOINTS = detectionResult.waypoints.map(wp => ({ x: wp.x, z: wp.z }));
        log(`Loaded ${PATH_WAYPOINTS.length} waypoints from VLM detection`);

        // Log each detected waypoint
        PATH_WAYPOINTS.forEach((wp, i) => {
          const desc = detectionResult.waypoints[i].description || '';
          log(`  WP${i}: (${wp.x.toFixed(2)}, ${wp.z.toFixed(2)}) ${desc}`);
        });

        // Visualize detected obstacles if any
        if (detectionResult.obstacles && detectionResult.obstacles.length > 0) {
          visualizeObstacles(detectionResult.obstacles);
          log(`Visualized ${detectionResult.obstacles.length} obstacles to avoid`);
        }

        // Reset navigation state and redraw path
        currentWaypointIdx = 1;
        drawPath();
        log(`Final path: ${PATH_WAYPOINTS.map(w => `(${w.x.toFixed(1)},${w.z.toFixed(1)})`).join(' -> ')}`);

        // Small delay so the user can see the planned path before navigation starts
        await new Promise(r => setTimeout(r, 2000));

        // ---- PHASE 2: Navigate with real-time obstacle avoidance ----
        log('Phase 2: Starting real-time navigation with Overshoot...');
        const canvasStream = renderer.domElement.captureStream(10);

        const origGUM2 = navigator.mediaDevices.getUserMedia.bind(navigator.mediaDevices);
        navigator.mediaDevices.getUserMedia = async (constraints) => {
          if (constraints && constraints.video) return canvasStream;
          return origGUM2(constraints);
        };

        const vision = new RealtimeVision({
          apiKey: key,
          model: 'Qwen/Qwen3.5-9B',
          prompt: buildNavPrompt(),
          source: { type: 'camera', cameraFacing: 'environment' },
          outputSchema: {
            type: 'object',
            properties: {
              adjust_dx: { type: 'number', description: 'Lateral X adjustment for obstacle avoidance (-0.15 to 0.15, 0 if clear)' },
              adjust_dz: { type: 'number', description: 'Lateral Z adjustment for obstacle avoidance (-0.15 to 0.15, 0 if clear)' },
              reasoning: { type: 'string', description: 'What you see ahead' },
            },
            required: ['adjust_dx', 'adjust_dz', 'reasoning'],
          },
          onResult: (result) => {
            if (!result.ok) {
              const done = stepTowardWaypoint();
              if (done) { vision.stop(); overshootResultEl.textContent = 'Path complete!'; return; }
              overshootResultEl.textContent = `VLM error (still moving): ${result.error || 'unknown'}`;
              vision.updatePrompt(buildNavPrompt());
              return;
            }

            let cmd;
            try {
              let raw = result.result.trim();
              if (raw.startsWith('```')) raw = raw.replace(/^```(?:json)?\n?/, '').replace(/\n?```$/, '').trim();
              cmd = JSON.parse(raw);
            } catch {
              const done = stepTowardWaypoint();
              if (done) { vision.stop(); overshootResultEl.textContent = 'Path complete!'; return; }
              vision.updatePrompt(buildNavPrompt());
              return;
            }

            const adjDx = Math.max(-0.15, Math.min(0.15, cmd.adjust_dx || 0));
            const adjDz = Math.max(-0.15, Math.min(0.15, cmd.adjust_dz || 0));

            const done = stepTowardWaypoint(adjDx, adjDz);

            const wp = PATH_WAYPOINTS[currentWaypointIdx];
            const dist = Math.hypot(cube.position.x - wp.x, cube.position.z - wp.z);
            const wpLabel = `WP ${currentWaypointIdx}/${PATH_WAYPOINTS.length - 1}`;
            overshootResultEl.textContent = `${wpLabel} | dist:${dist.toFixed(2)} adj:(${adjDx.toFixed(2)},${adjDz.toFixed(2)})\n${cmd.reasoning || ''}`;
            log(`Nav -> (${cube.position.x.toFixed(2)}, ${cube.position.z.toFixed(2)}) | ${cmd.reasoning || ''}`);

            if (done) {
              overshootResultEl.textContent = 'Path complete!';
              log('Path following complete!');
              vision.stop();
              return;
            }

            vision.updatePrompt(buildNavPrompt());
          },
          onError: (error) => {
            overshootResultEl.textContent = `Error: ${error.message}`;
            log(`Overshoot error: ${error.message}`);
          },
        });

        await vision.start();
        log('Overshoot real-time navigation started');
        overshootResultEl.textContent = `Navigating ${PATH_WAYPOINTS.length - 1} waypoints (deviating around obstacles)`;
        window._overshootVision = vision;
      } catch (err) {
        overshootResultEl.textContent = `Failed: ${err.message}`;
        log(`Overshoot init failed: ${err.message}`);
      }
    }

    initOvershoot();

    // WebSocket connection
    function connect() {
      const ws = new WebSocket('ws://localhost:8000/ws');

      ws.onopen = () => {
        statusEl.textContent = 'Connected to server';
        statusEl.style.color = '#0f0';
        log('WebSocket connected');
      };

      ws.onmessage = (event) => {
        const cmd = JSON.parse(event.data);
        log(`Received: ${JSON.stringify(cmd)}`);

        switch (cmd.action) {
          case 'updatePosition':
            cube.position.x += cmd.dx;
            cube.position.y += cmd.dy;
            cube.position.z += cmd.dz;
            log(`Moved cube by (${cmd.dx}, ${cmd.dy}, ${cmd.dz}) -> (${cube.position.x.toFixed(2)}, ${cube.position.y.toFixed(2)}, ${cube.position.z.toFixed(2)})`);
            break;

          case 'updateRotation':
            cube.rotation.x += cmd.dx;
            cube.rotation.y += cmd.dy;
            cube.rotation.z += cmd.dz;
            log(`Rotated cube by (${cmd.dx.toFixed(2)}, ${cmd.dy.toFixed(2)}, ${cmd.dz.toFixed(2)})`);
            break;

          case 'cameraUpdate':
            if (cmd.view === 'firstperson') {
              useFirstPerson = true;
              controls.enabled = false;
            } else if (cmd.view === 'orbit') {
              useFirstPerson = false;
              controls.enabled = true;
            }
            if (cmd.zoomPercentage !== undefined) {
              const zoom = cmd.zoomPercentage / 100;
              const distance = 3 + (1 - zoom) * 10;
              camera.position.normalize().multiplyScalar(distance);
              camera.lookAt(0, 0, 0);
            }
            log(`Camera update - view: ${useFirstPerson ? 'FP' : 'orbit'}`);
            break;

          default:
            log(`Unknown action: ${cmd.action}`);
        }

        renderer.render(scene, fpCamera);
        requestAnimationFrame(() => {
          const image = screenshot();
          ws.send(JSON.stringify({ image }));
          log('Sent screenshot back');
        });
      };

      ws.onclose = () => {
        statusEl.textContent = 'Disconnected - reconnecting...';
        statusEl.style.color = '#f00';
        log('WebSocket disconnected, retrying in 2s...');
        setTimeout(connect, 2000);
      };

      ws.onerror = () => {
        ws.close();
      };
    }

    connect();
  </script>
</body>
</html>
