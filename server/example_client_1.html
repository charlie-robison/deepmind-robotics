<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Three.js WebSocket Example</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #nav-bar {
      position: fixed; top: 0; left: 0; width: 100%; z-index: 100;
      display: flex; gap: 8px; padding: 10px 16px;
      background: rgba(0,0,0,0.85); border-bottom: 1px solid rgba(255,255,255,0.15);
    }
    #nav-bar a {
      text-decoration: none; font-family: monospace; font-size: 13px;
      padding: 6px 16px; border-radius: 4px; cursor: pointer;
      border: 1px solid rgba(255,255,255,0.25); color: #aaa;
      transition: background 0.15s, color 0.15s;
    }
    #nav-bar a:hover { background: rgba(255,255,255,0.1); color: #fff; }
    #nav-bar a.active {
      background: #4488ff; color: #fff; border-color: #4488ff;
    }
    #status {
      position: fixed; top: 10px; left: 10px; color: #fff;
      font-family: monospace; font-size: 14px; z-index: 10;
      background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 4px;
    }
    #log {
      position: fixed; bottom: 10px; left: 10px; color: #0f0;
      font-family: monospace; font-size: 12px; z-index: 10;
      background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 4px;
      max-height: 200px; overflow-y: auto; width: 400px;
    }
    #topdown {
      position: fixed; top: 10px; right: 10px; z-index: 10;
      border: 2px solid rgba(255,255,255,0.3); border-radius: 6px;
      overflow: hidden;
    }
    #topdown-label {
      position: fixed; top: 14px; right: 60px; z-index: 11;
      color: #fff; font-family: monospace; font-size: 11px;
      background: rgba(0,0,0,0.5); padding: 2px 6px; border-radius: 3px;
      pointer-events: none;
    }
    #overshoot-panel {
      position: fixed; bottom: 10px; right: 10px; z-index: 10;
      background: rgba(0,0,0,0.8); color: #0ff; padding: 12px 16px;
      font-family: monospace; font-size: 12px; border-radius: 6px;
      max-width: 400px; max-height: 200px; overflow-y: auto;
      border: 1px solid rgba(0,255,255,0.3);
    }
    #overshoot-panel .label {
      color: #fff; font-size: 11px; margin-bottom: 6px; opacity: 0.7;
    }
  </style>
</head>
<body>
  <div id="nav-bar">
    <a href="/client-1" class="active">Create Path</a>
    <a href="/competition">Run Competition</a>
  </div>
  <div id="status">Connecting...</div>
  <div id="log"></div>
  <div id="topdown"></div>
  <div id="topdown-label">Top Down</div>
  <div id="overshoot-panel">
    <div class="label">Overshoot Vision</div>
    <div id="overshoot-result">Initializing...</div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/",
        "overshoot": "https://esm.sh/overshoot@2.0.0-alpha.7",
        "livekit-client": "https://esm.sh/livekit-client",
        "hls.js": "https://esm.sh/hls.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { RealtimeVision } from 'overshoot';

    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');

    function log(msg) {
      const line = document.createElement('div');
      line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }

    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(3, 3, 3);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);

    // Lighting
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(5, 10, 7);
    scene.add(dirLight);

    // Load cozy living room GLB as environment
    const gltfLoader = new GLTFLoader();
    let loadedGltfScene = null;
    gltfLoader.load('/static/cozy_living_room_baked.glb', (gltf) => {
      scene.add(gltf.scene);
      loadedGltfScene = gltf.scene;
      log('Loaded cozy living room environment');
      requestAnimationFrame(() => {
        computeSceneObstacles(gltf.scene);
        callGeminiPath();
      });
    }, undefined, (err) => {
      log(`Error loading GLB: ${err.message}`);
    });

    // Object to move
    const geometry = new THREE.BoxGeometry(0.2, 0.8, 0.2);
    const material = new THREE.MeshStandardMaterial({ color: 0x4488ff });
    const cube = new THREE.Mesh(geometry, material);
    cube.position.set(-3, 0.4, 4); // left side, further back
    scene.add(cube);

    // First-person camera attached to the cube
    const fpCamera = new THREE.PerspectiveCamera(90, window.innerWidth / window.innerHeight, 0.01, 1000);
    cube.add(fpCamera);
    fpCamera.position.set(0, 0.4, 0); // on top of the cube's head
    // fpCamera faces local -Z by default (no lookAt needed, it inherits cube rotation)
    fpCamera.rotation.set(0, 0, 0);

    let useFirstPerson = true; // default to first-person view

    // Top-down mini-map — camera fits to room model
    const topdownEl = document.getElementById('topdown');

    const topdownRenderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    topdownEl.appendChild(topdownRenderer.domElement);

    const overlayCanvas = document.createElement('canvas');
    overlayCanvas.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;';
    topdownEl.appendChild(overlayCanvas);
    const overlayCtx = overlayCanvas.getContext('2d');

    const topdownCamera = new THREE.OrthographicCamera(-5, 5, 5, -5, 0.1, 100);
    topdownCamera.position.set(0, 20, 0);
    topdownCamera.lookAt(0, 0, 0);

    // Room bounds (hardcoded to match the actual room walls)
    const camLeft = -3.1, camRight = 2.5, camTop = -3.5, camBottom = 4.4;
    const worldW = camRight - camLeft;  // 8
    const worldH = camBottom - camTop;  // 8
    const tdW = 500, tdH = Math.round(500 * (worldH / worldW));

    topdownRenderer.setSize(tdW, tdH);
    overlayCanvas.width = tdW;
    overlayCanvas.height = tdH;
    topdownEl.style.width = tdW + 'px';
    topdownEl.style.height = tdH + 'px';

    topdownCamera.left = -worldW / 2;
    topdownCamera.right = worldW / 2;
    topdownCamera.top = worldH / 2;
    topdownCamera.bottom = -worldH / 2;
    const camCx = (camLeft + camRight) / 2;
    const camCz = (camTop + camBottom) / 2;
    topdownCamera.position.set(camCx, 20, camCz);
    topdownCamera.lookAt(camCx, 0, camCz);
    topdownCamera.updateProjectionMatrix();

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      const activeCamera = useFirstPerson ? fpCamera : camera;
      renderer.render(scene, activeCamera);

      scene.background = new THREE.Color(0x000000);
      topdownRenderer.render(scene, topdownCamera);
      scene.background = new THREE.Color(0x1a1a2e);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      fpCamera.aspect = window.innerWidth / window.innerHeight;
      fpCamera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Toggle between first-person and orbit camera with 'V' key
    window.addEventListener('keydown', (e) => {
      if (e.key === 'v' || e.key === 'V') {
        useFirstPerson = !useFirstPerson;
        controls.enabled = !useFirstPerson;
        log(`Camera: ${useFirstPerson ? 'First Person' : 'Orbit'}`);
      }
    });

    // Take a screenshot from the first-person camera
    function screenshot() {
      renderer.render(scene, fpCamera);
      return renderer.domElement.toDataURL('image/png');
    }

    // --- Path definition & visualization ---
    const overshootResultEl = document.getElementById('overshoot-result');

    let PATH_WAYPOINTS = [];
    let currentWaypointIdx = 1;
    const WAYPOINT_THRESHOLD = 0.3;
    const STEP_SIZE = 0.25;
    const pathY = 0.05;

    // Trail: track where the cube has actually been
    const trailPoints = [cube.position.clone()];
    const trailGeom = new THREE.BufferGeometry().setFromPoints(trailPoints);
    const trailLine = new THREE.Line(trailGeom, new THREE.LineBasicMaterial({ color: 0xff4444 }));
    scene.add(trailLine);

    function updateTrail() {
      trailPoints.push(new THREE.Vector3(cube.position.x, pathY, cube.position.z));
      trailGeom.setFromPoints(trailPoints);
    }

    function drawPath() {
      const pathPoints = PATH_WAYPOINTS.map(wp => new THREE.Vector3(wp.x, pathY, wp.z));
      const pathGeom = new THREE.BufferGeometry().setFromPoints(pathPoints);
      const pathLine = new THREE.Line(pathGeom, new THREE.LineBasicMaterial({ color: 0x00ff00, linewidth: 2 }));
      scene.add(pathLine);

      PATH_WAYPOINTS.forEach((wp, i) => {
        const dotGeo = new THREE.SphereGeometry(0.08, 8, 8);
        const dotMat = new THREE.MeshBasicMaterial({ color: i === 0 ? 0x0088ff : 0x00ff00 });
        const dot = new THREE.Mesh(dotGeo, dotMat);
        dot.position.set(wp.x, pathY + 0.05, wp.z);
        scene.add(dot);
      });
    }

    function drawOverlay(result) {
      overlayCtx.clearRect(0, 0, tdW, tdH);

      // Scale factor in case Gemini dimensions differ from canvas
      const scX = tdW / (result.image_width || tdW);
      const scY = tdH / (result.image_height || tdH);
      const s = (p) => ({ x: p.x * scX, y: p.y * scY });

      // Draw obstacle bounding boxes
      if (result.obstacles) {
        overlayCtx.strokeStyle = 'rgba(255, 0, 0, 0.5)';
        overlayCtx.lineWidth = 2;
        overlayCtx.setLineDash([6, 4]);
        for (const obs of result.obstacles) {
          const x = obs.x_min * scX, y = obs.y_min * scY;
          const w = (obs.x_max - obs.x_min) * scX, h = (obs.y_max - obs.y_min) * scY;
          overlayCtx.strokeRect(x, y, w, h);
          overlayCtx.fillStyle = 'rgba(255, 0, 0, 0.1)';
          overlayCtx.fillRect(x, y, w, h);
        }
        overlayCtx.setLineDash([]);
      }

      // Draw path line
      const points = [result.start, ...result.waypoints, result.end].map(s);
      overlayCtx.strokeStyle = '#00ff00';
      overlayCtx.lineWidth = 3;
      overlayCtx.beginPath();
      overlayCtx.moveTo(points[0].x, points[0].y);
      for (let i = 1; i < points.length; i++) {
        overlayCtx.lineTo(points[i].x, points[i].y);
      }
      overlayCtx.stroke();

      // Draw waypoint dots
      for (let i = 0; i < points.length; i++) {
        const p = points[i];
        overlayCtx.beginPath();
        overlayCtx.arc(p.x, p.y, 5, 0, Math.PI * 2);
        if (i === 0) {
          overlayCtx.fillStyle = '#00aaff';
        } else if (i === points.length - 1) {
          overlayCtx.fillStyle = '#ff4444';
        } else {
          overlayCtx.fillStyle = '#00ff00';
        }
        overlayCtx.fill();
        overlayCtx.strokeStyle = '#fff';
        overlayCtx.lineWidth = 1;
        overlayCtx.stroke();
      }
    }

    function draw3DObstacles(result) {
      if (!result.obstacles) return;
      const obsMat = new THREE.MeshBasicMaterial({ color: 0xff0000, transparent: true, opacity: 0.15 });
      const edgeMat = new THREE.LineBasicMaterial({ color: 0xff0000, transparent: true, opacity: 0.5 });
      for (const obs of result.obstacles) {
        const tl = pixelToWorld(obs.x_min, obs.y_min);
        const br = pixelToWorld(obs.x_max, obs.y_max);
        const w = br.x - tl.x;
        const d = br.z - tl.z;
        const geo = new THREE.BoxGeometry(w, 1.5, d);
        const mesh = new THREE.Mesh(geo, obsMat);
        mesh.position.set(tl.x + w / 2, 0.75, tl.z + d / 2);
        scene.add(mesh);
        const edges = new THREE.EdgesGeometry(geo);
        const line = new THREE.LineSegments(edges, edgeMat);
        line.position.copy(mesh.position);
        scene.add(line);
      }
    }

    // Coordinate conversion using actual camera bounds
    function worldToPixel(wx, wz) {
      return {
        x: Math.round(((wx - camLeft) / (camRight - camLeft)) * tdW),
        y: Math.round(((wz - camTop) / (camBottom - camTop)) * tdH),
      };
    }

    function pixelToWorld(px, py) {
      return {
        x: (px / tdW) * (camRight - camLeft) + camLeft,
        z: (py / tdH) * (camBottom - camTop) + camTop,
      };
    }

    // Compute obstacle bounding boxes from actual 3D scene geometry
    let sceneObstacles = [];
    function computeSceneObstacles(gltfScene) {
      const padding = 12; // pixels
      const boxes = [];
      // Max footprint fraction — skip objects covering more than 60% of the view (floors, walls, ceilings)
      const maxFootprint = tdW * tdH * 0.6;

      // Collect all meshes in the scene
      const candidates = [];
      gltfScene.traverse((obj) => {
        if (obj.isMesh) candidates.push(obj);
      });

      log(`Scene has ${candidates.length} meshes total`);

      for (const mesh of candidates) {
        const box = new THREE.Box3().setFromObject(mesh);
        if (box.isEmpty()) continue;
        // Skip objects entirely above head height (ceiling lights, etc.)
        if (box.min.y > 2.0) continue;
        // Skip flat horizontal objects at floor level (floor planes: very thin in Y, very wide in XZ)
        const yExtent = box.max.y - box.min.y;
        const xExtent = box.max.x - box.min.x;
        const zExtent = box.max.z - box.min.z;
        if (yExtent < 0.05 && xExtent > 3 && zExtent > 3) continue;

        const min = worldToPixel(box.min.x, box.min.z);
        const max = worldToPixel(box.max.x, box.max.z);
        const x_min = Math.max(0, Math.min(min.x, max.x) - padding);
        const y_min = Math.max(0, Math.min(min.y, max.y) - padding);
        const x_max = Math.min(tdW, Math.max(min.x, max.x) + padding);
        const y_max = Math.min(tdH, Math.max(min.y, max.y) + padding);

        const area = (x_max - x_min) * (y_max - y_min);
        // Skip room-sized objects (floor, walls, ceiling)
        if (area > maxFootprint) {
          log(`Skipping large object: ${mesh.name || 'unnamed'} (${area.toFixed(0)}px² > ${maxFootprint.toFixed(0)}px²)`);
          continue;
        }
        // Skip tiny objects (< 10px in both dimensions)
        if (x_max - x_min < 10 && y_max - y_min < 10) continue;
        boxes.push({ label: mesh.name || 'object', x_min, y_min, x_max, y_max });
      }

      sceneObstacles = boxes;
      log(`Computed ${sceneObstacles.length} obstacle boxes from scene geometry`);
      return sceneObstacles;
    }

    async function callGeminiPath() {
      overshootResultEl.textContent = 'Generating path with Gemini...';
      log('Capturing top-down view for Gemini path planning...');

      try {
        topdownRenderer.render(scene, topdownCamera);
        const blob = await new Promise(resolve => topdownRenderer.domElement.toBlob(resolve, 'image/png'));

        const startPixel = worldToPixel(cube.position.x, cube.position.z);
        log(`Cube start at pixel (${startPixel.x}, ${startPixel.y})`);

        const form = new FormData();
        form.append('file', blob, 'topdown.png');
        form.append('start_x', startPixel.x);
        form.append('start_y', startPixel.y);
        if (sceneObstacles.length > 0) {
          form.append('obstacles', JSON.stringify(sceneObstacles));
        }

        const resp = await fetch('/tracePath', { method: 'POST', body: form });
        if (!resp.ok) throw new Error(`Server error: ${resp.status}`);
        const result = await resp.json();

        // Use client-computed obstacles for overlay if available
        const overlayObstacles = sceneObstacles.length > 0 ? sceneObstacles : result.obstacles;

        // Scale waypoints from response dimensions to canvas dimensions before converting to world
        const rScX = tdW / (result.image_width || tdW);
        const rScY = tdH / (result.image_height || tdH);
        const geminiWaypoints = result.waypoints.map(wp => pixelToWorld(wp.x * rScX, wp.y * rScY));
        PATH_WAYPOINTS = [
          { x: cube.position.x, z: cube.position.z },
          ...geminiWaypoints,
        ];
        currentWaypointIdx = 1;

        log(`Gemini dims: ${result.image_width}x${result.image_height}, canvas: ${tdW}x${tdH}`);
        log(`Gemini path: ${PATH_WAYPOINTS.length} waypoints, avoiding ${overlayObstacles.length} obstacles`);
        drawPath();
        drawOverlay({ ...result, obstacles: overlayObstacles });
        // draw3DObstacles(result);
        initOvershoot();
      } catch (err) {
        overshootResultEl.textContent = `Path generation failed: ${err.message}`;
        log(`Gemini path error: ${err.message}`);
      }
    }

    // Rotate cube so the FP camera (local -Z) faces the final goal
    function faceGoal() {
      const GOAL = PATH_WAYPOINTS[PATH_WAYPOINTS.length - 1];
      if (!GOAL) return 0;
      const dx = GOAL.x - cube.position.x;
      const dz = GOAL.z - cube.position.z;
      // atan2(x, z) gives angle from +Z; camera faces -Z, so add PI
      const targetYaw = Math.atan2(dx, dz) + Math.PI;
      let diff = targetYaw - cube.rotation.y;
      // Normalize to [-PI, PI]
      while (diff > Math.PI) diff -= 2 * Math.PI;
      while (diff < -Math.PI) diff += 2 * Math.PI;
      cube.rotation.y += diff; // snap to target (no smoothing needed)
      return diff;
    }

    function buildNavPrompt() {
      const pos = cube.position;
      const wp = PATH_WAYPOINTS[currentWaypointIdx];
      const dx = wp.x - pos.x;
      const dz = wp.z - pos.z;
      const dist = Math.hypot(dx, dz);
      return `You are an obstacle-avoidance system for a robot navigating a 3D room. You see the robot's first-person view.

Current position: x=${pos.x.toFixed(2)}, z=${pos.z.toFixed(2)}
Target waypoint ${currentWaypointIdx}/${PATH_WAYPOINTS.length - 1}: x=${wp.x}, z=${wp.z} (distance: ${dist.toFixed(2)})
Heading: ${(cube.rotation.y * 180 / Math.PI).toFixed(0)} degrees

The robot is already moving toward the waypoint. Your job is to check for obstacles.
- If the path ahead is CLEAR, output adjust_dx=0 and adjust_dz=0.
- If you see furniture, walls, or objects blocking the path, output a small lateral adjustment (max 0.15 per axis) to steer around it.
- "reasoning": describe what you see ahead (clear floor, furniture edge, wall, etc.)`;
    }

    // Move one step toward the current waypoint, returns true if path is complete
    function stepTowardWaypoint(adjustDx = 0, adjustDz = 0) {
      const wp = PATH_WAYPOINTS[currentWaypointIdx];
      const dx = wp.x - cube.position.x;
      const dz = wp.z - cube.position.z;
      const dist = Math.hypot(dx, dz);

      if (dist < WAYPOINT_THRESHOLD) {
        if (currentWaypointIdx < PATH_WAYPOINTS.length - 1) {
          currentWaypointIdx++;
          log(`Reached waypoint ${currentWaypointIdx}/${PATH_WAYPOINTS.length - 1}`);
          return false;
        }
        return true; // done
      }

      // Normalize direction and scale to step size
      const step = Math.min(STEP_SIZE, dist);
      let moveDx = (dx / dist) * step + adjustDx;
      let moveDz = (dz / dist) * step + adjustDz;

      // Clamp total movement
      const mag = Math.hypot(moveDx, moveDz);
      if (mag > STEP_SIZE) {
        moveDx = (moveDx / mag) * STEP_SIZE;
        moveDz = (moveDz / mag) * STEP_SIZE;
      }

      // Rotate to face the final goal
      const rotDy = faceGoal();

      // Move
      cube.position.x += moveDx;
      cube.position.z += moveDz;
      updateTrail();

      // Log to server (fire and forget)
      fetch('/updatePosition', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ dx: moveDx, dy: 0, dz: moveDz }),
      }).catch(() => {});

      if (Math.abs(rotDy) > 0.01) {
        fetch('/updateRotation', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ dx: 0, dy: rotDy, dz: 0 }),
        }).catch(() => {});
      }

      return false;
    }

    async function initOvershoot() {
      try {
        const keyResp = await fetch('/overshoot-key');
        const { key } = await keyResp.json();
        if (!key) {
          overshootResultEl.textContent = 'No API key configured';
          log('Set OVERSHOOT_API env var on the server');
          return;
        }

        // Capture the main renderer canvas as a MediaStream
        const canvasStream = renderer.domElement.captureStream(10);

        const originalGetUserMedia = navigator.mediaDevices.getUserMedia.bind(navigator.mediaDevices);
        navigator.mediaDevices.getUserMedia = async (constraints) => {
          if (constraints && constraints.video) return canvasStream;
          return originalGetUserMedia(constraints);
        };

        const vision = new RealtimeVision({
          apiKey: key,
          model: 'Qwen/Qwen3.5-9B',
          prompt: buildNavPrompt(),
          source: { type: 'camera', cameraFacing: 'environment' },
          outputSchema: {
            type: 'object',
            properties: {
              adjust_dx: { type: 'number', description: 'Lateral X adjustment for obstacle avoidance (-0.15 to 0.15, 0 if clear)' },
              adjust_dz: { type: 'number', description: 'Lateral Z adjustment for obstacle avoidance (-0.15 to 0.15, 0 if clear)' },
              reasoning: { type: 'string', description: 'What you see ahead' },
            },
            required: ['adjust_dx', 'adjust_dz', 'reasoning'],
          },
          onResult: (result) => {
            if (!result.ok) {
              // Still move deterministically even if VLM errors
              const done = stepTowardWaypoint();
              if (done) { vision.stop(); overshootResultEl.textContent = 'Path complete!'; return; }
              overshootResultEl.textContent = `VLM error (still moving): ${result.error || 'unknown'}`;
              vision.updatePrompt(buildNavPrompt());
              return;
            }

            let cmd;
            try {
              let raw = result.result.trim();
              if (raw.startsWith('```')) raw = raw.replace(/^```(?:json)?\n?/, '').replace(/\n?```$/, '').trim();
              cmd = JSON.parse(raw);
            } catch {
              // Parse failed — move without adjustment
              const done = stepTowardWaypoint();
              if (done) { vision.stop(); overshootResultEl.textContent = 'Path complete!'; return; }
              vision.updatePrompt(buildNavPrompt());
              return;
            }

            // Clamp obstacle-avoidance adjustments
            const adjDx = Math.max(-0.15, Math.min(0.15, cmd.adjust_dx || 0));
            const adjDz = Math.max(-0.15, Math.min(0.15, cmd.adjust_dz || 0));

            const done = stepTowardWaypoint(adjDx, adjDz);

            const wp = PATH_WAYPOINTS[currentWaypointIdx];
            const dist = Math.hypot(cube.position.x - wp.x, cube.position.z - wp.z);
            const wpLabel = `WP ${currentWaypointIdx}/${PATH_WAYPOINTS.length - 1}`;
            overshootResultEl.textContent = `${wpLabel} | dist:${dist.toFixed(2)} adj:(${adjDx.toFixed(2)},${adjDz.toFixed(2)})\n${cmd.reasoning || ''}`;
            log(`Nav → (${cube.position.x.toFixed(2)}, ${cube.position.z.toFixed(2)}) | ${cmd.reasoning || ''}`);

            if (done) {
              overshootResultEl.textContent = 'Path complete!';
              log('Path following complete!');
              vision.stop();
              return;
            }

            vision.updatePrompt(buildNavPrompt());
          },
          onError: (error) => {
            overshootResultEl.textContent = `Error: ${error.message}`;
            log(`Overshoot error: ${error.message}`);
          },
        });

        await vision.start();
        log('Overshoot path-following started');
        overshootResultEl.textContent = `Following path: ${PATH_WAYPOINTS.length - 1} waypoints`;
        window._overshootVision = vision;
      } catch (err) {
        overshootResultEl.textContent = `Failed: ${err.message}`;
        log(`Overshoot init failed: ${err.message}`);
      }
    }

    // WebSocket connection
    function connect() {
      const ws = new WebSocket('ws://localhost:8000/ws');

      ws.onopen = () => {
        statusEl.textContent = 'Connected to server';
        statusEl.style.color = '#0f0';
        log('WebSocket connected');
      };

      ws.onmessage = (event) => {
        const cmd = JSON.parse(event.data);
        log(`Received: ${JSON.stringify(cmd)}`);

        switch (cmd.action) {
          case 'updatePosition':
            cube.position.x += cmd.dx;
            cube.position.y += cmd.dy;
            cube.position.z += cmd.dz;
            log(`Moved cube by (${cmd.dx}, ${cmd.dy}, ${cmd.dz}) → (${cube.position.x.toFixed(2)}, ${cube.position.y.toFixed(2)}, ${cube.position.z.toFixed(2)})`);
            break;

          case 'updateRotation':
            cube.rotation.x += cmd.dx;
            cube.rotation.y += cmd.dy;
            cube.rotation.z += cmd.dz;
            log(`Rotated cube by (${cmd.dx.toFixed(2)}, ${cmd.dy.toFixed(2)}, ${cmd.dz.toFixed(2)})`);
            break;

          case 'cameraUpdate':
            if (cmd.view === 'firstperson') {
              useFirstPerson = true;
              controls.enabled = false;
            } else if (cmd.view === 'orbit') {
              useFirstPerson = false;
              controls.enabled = true;
            }
            if (cmd.zoomPercentage !== undefined) {
              const zoom = cmd.zoomPercentage / 100;
              const distance = 3 + (1 - zoom) * 10;
              camera.position.normalize().multiplyScalar(distance);
              camera.lookAt(0, 0, 0);
            }
            log(`Camera update — view: ${useFirstPerson ? 'FP' : 'orbit'}`);
            break;

          default:
            log(`Unknown action: ${cmd.action}`);
        }

        // Render one frame then send screenshot back
        renderer.render(scene, fpCamera);
        requestAnimationFrame(() => {
          const image = screenshot();
          ws.send(JSON.stringify({ image }));
          log('Sent screenshot back');
        });
      };

      ws.onclose = () => {
        statusEl.textContent = 'Disconnected — reconnecting...';
        statusEl.style.color = '#f00';
        log('WebSocket disconnected, retrying in 2s...');
        setTimeout(connect, 2000);
      };

      ws.onerror = () => {
        ws.close();
      };
    }

    connect();
  </script>
